<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>

    <style>
        * { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .prose code { font-family: 'JetBrains Mono', monospace; direction: ltr; text-align: left; background-color: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; color: #59b0ff; }
        .prose pre { background: #0f172a; padding: 1.25rem; border-radius: 0.75rem; overflow-x: auto; border: 1px border-white/5; margin: 1.5rem 0; }
        .prose pre code { background: transparent; padding: 0; border-radius: 0; color: #fff; font-size: 0.9em; }
        .prose h1, .prose h2, .prose h3 { font-weight: 700; color: #fff; margin-top: 2rem; margin-bottom: 1rem; }
        .prose h1 { font-size: 1.8em; }
        .prose h2 { font-size: 1.4em; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }

</head>
<body class="bg-surface-950 text-white font-arabic antialiased" x-data="courseView()">

    <!-- Navbar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-surface-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </div>
                <span class="text-lg font-bold bg-gradient-to-l from-brand-400 to-purple-400 bg-clip-text text-transparent">AI Rank One</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm text-surface-200 hover:text-white transition-colors">الرئيسية</a>
                <span x-show="user" class="text-sm text-surface-200" x-text="user.email"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-extrabold mb-4" x-text="course.title"></h1>
        <p class="text-surface-200 text-lg mb-8 leading-relaxed" x-text="course.description"></p>

        <!-- Module Navigation Tabs -->
        <div class="flex border-b border-white/10 mb-8 overflow-x-auto whitespace-nowrap">
            <template x-for="(mod, index) in course.modules" :key="index">
                <button
                    @click="activeModule = index"
                    class="py-3 px-4 text-sm font-semibold border-b-2 transition-colors"
                    :class="activeModule === index ? 'border-brand-500 text-brand-400' : 'border-transparent text-surface-200 hover:text-white'"
                    x-text="'الوحدة ' + (index + 1)"
                ></button>
            </template>
        </div>

        <!-- Render Content -->
        <div class="prose prose-invert max-w-none">
            <!-- Module Header -->
            <h2 class="text-xl font-bold mb-4" x-text="course.modules[activeModule]?.title"></h2>

            <!-- Module Body -->
            <div x-show="activeModule === 0 || hasAccess">
                <div x-html="renderMarkdown(course.modules[activeModule]?.content)"></div>
            </div>

            <!-- Paywall Overlay for Modules 2-5 -->
            <div x-show="activeModule > 0 && !hasAccess" class="p-8 rounded-2xl bg-gradient-to-br from-brand-950/20 to-purple-950/20 border border-brand-500/20 text-center my-8">
                <svg class="w-12 h-12 text-brand-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                <h3 class="text-xl font-bold mb-2">هذه الوحدة مغلقة</h3>
                <p class="text-surface-200 text-sm max-w-md mx-auto mb-6">اشترك الآن لفتح جميع الوحدات التقنية الأربعة الإضافية والحصول على الكود المصدري وشهادة الإتمام.</p>
                <a :href="'https://checkout.lemonsqueezy.com/checkout/buy/' + (window.PUBLIC_CONFIG?.LEMON_VARIANT_ID || 'VARIANT_ID') + '?checkout[custom][course_slug]=' + course.slug" id="checkout-btn" class="inline-block px-8 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 font-semibold text-white transition-all shadow-lg shadow-brand-600/25">
                    اشترك الآن مقابل 29$ فقط
                </a>
            </div>
        </div>
    </main>

    <!-- Script Data Injected by Compiler -->
    <script id="course-data" type="application/json">
    {"title": "بناء أنظمة الوكلاء المتعددة (Multi-Agents) باستخدام LangGraph", "description": "دورة عملية متقدمة لمهندسي البرمجيات العرب لبناء أنظمة تتعاون من وكلاء ذكاء اصطناعي متخصصين باستخدام LangGraph، مع مشاريع كود حقيقية قابلة للتشغيل.", "tags": ["LangGraph", "Python", "Multi-Agent Systems", "LLM Orchestration"], "price": 29, "duration": "4 ساعات", "gradient": "from-brand-500 to-indigo-500", "modules": [{"title": "الوحدة 1: المفاهيم الأساسية وهندسة الوكلاء", "content": "# المفاهيم الأساسية وهندسة الوكلاء\n\nفي بيئات العمل الحقيقية لا يمكن الاعتماد على نموذج لغوي كبير (LLM) واحد لأداء مهام متنوعة ومعقدة. الحل هو تصميم **عدة وكلاء متخصصين** يعملون كفريق منسّق.\n\n## لماذا الأنظمة متعددة الوكلاء؟\n- **التخصص**: كل وكيل يتقن مهمة واحدة (بحث، كتابة كود، مراجعة).\n- **قابلية الصيانة**: تعديل وكيل لا يكسر بقية النظام.\n- **الشفافية**: كل خطوة قابلة للتتبع والتصحيح.\n\n## ما هو LangGraph؟\nإطار عمل يمثّل تدفق العمل كـ **رسم بياني (Graph)** حيث:\n- **العقد (Nodes)**: دوال تمثّل الوكلاء أو المعالجات.\n- **الحواف (Edges)**: تدفق البيانات والشروط الانتقالية بين العقد.\n\n## إعداد البيئة\n\n```bash\npip install langgraph langchain-openai\n```\n\n```python\nfrom typing import Annotated, TypedDict\nfrom langgraph.graph.message import add_messages\n\nclass AgentState(TypedDict):\n    messages: Annotated[list, add_messages]\n```\n\nهذه الحالة المشتركة (`AgentState`) تحفظ كامل سجل الحوار وتنسّقه تلقائياً بين الوكلاء."}, {"title": "الوحدة 2: بناء الرسم البياني وهيكلة العقد", "content": "# بناء الرسم البياني وهيكلة العقد\n\nنبني رسماً بيانياً بسيطاً: وكيل بحث ← وكيل كود ← قرار تجميع.\n\n```python\nfrom langgraph.graph import StateGraph, START, END\nfrom langgraph.prebuilt import ToolNode\n\ndef research_agent(state: AgentState):\n    # وكيل يجمع المعلومات من الأدوات المتاحة\n    return {\"messages\": [\"تم جمع المعلومات ذات الصلة\"]}\n\ndef code_agent(state: AgentState):\n    # وكيل يكتب الكود بناءً على ما جمعه الباحث\n    return {\"messages\": [\"تمت كتابة دالة المعالجة\"]}\n\ndef should_continue(state: AgentState):\n    # شرط انتقال: هل نتوقف أم نعيد للباحث؟\n    return \"end\" if len(state[\"messages\"]) > 6 else \"continue\"\n\ngraph = StateGraph(AgentState)\ngraph.add_node(\"researcher\", research_agent)\ngraph.add_node(\"coder\", code_agent)\ngraph.add_edge(START, \"researcher\")\ngraph.add_edge(\"researcher\", \"coder\")\ngraph.add_conditional_edges(\"coder\", should_continue, {\"continue\": \"researcher\", \"end\": END})\n```\n\nالحافة الشرطية `should_continue` تمنحك تحكماً كاملاً في حلقة التكرار بعكس الأطر الخطية البسيطة."}, {"title": "الوحدة 3: الذاكرة المستمرة وتبادل الرسائل", "content": "# الذاكرة المستمرة وتبادل الرسائل\n\nالمشكلة الشائعة: كل استدعاء للرسم البياني يبدأ من الصفر. الحل هو **الذاكرة (Checkpointer)**.\n\n```python\nfrom langgraph.checkpoint.memory import MemorySaver\n\nmemory = MemorySaver()\napp = graph.compile(checkpointer=memory)\n\nconfig = {\"configurable\": {\"thread_id\": \"user-session-42\"}}\napp.invoke({\"messages\": [\"اكتب خادم HTTP بسيط\"]}, config)\n# المكالمة التالية تتذكر سياق المحادثة السابقة\napp.invoke({\"messages\": [\"أضف معالجة للأخطاء\"]}, config)\n```\n\nكل `thread_id` يحتفظ بحالته المستقلة، مما يتيح محادثات متعددة متزامنة دون تداخل."}, {"title": "الوحدة 4: دمج الأدوات الخارجية (Tools) وحلقات التكرار", "content": "# دمج الأدوات الخارجية (Tools) وحلقات التكرار\n\nالوكيل أقوى عندما يستدعي أدوات حقيقية (بحث ويب، تنفيذ كود، قواعد بيانات).\n\n```python\nfrom langchain_core.tools import tool\n\n@tool\ndef run_python(code: str) -> str:\n    \"\"\"ينفّذ كود بايثون ويعيد المخرجات.\"\"\"\n    import subprocess\n    result = subprocess.run([\"python\", \"-c\", code], capture_output=True, text=True)\n    return result.stdout or result.stderr\n\ntools = [run_python]\ntool_node = ToolNode(tools)\n\ngraph.add_node(\"tools\", tool_node)\ngraph.add_edge(\"tools\", \"coder\")  # النتيجة ترجع للوكيل\n```\n\nهكذا يبني الوكيل حلقة: يكتب كوداً ← ينفّذه ← يراجع المخرج ← يصحح الخطأ."}, {"title": "الوحدة 5: النشر والمراقبة في الإنتاج", "content": "# النشر والمراقبة في الإنتاج\n\nلنشر النظام بأمان:\n\n## 1. العزل\nشغّل الرسم البياني داخل دالة خدمة (FastAPI) مع `thread_id` لكل مستخدم.\n\n```python\nfrom fastapi import FastAPI\napp_api = FastAPI()\n\n@app_api.post(\"/agent\")\nasync def chat(payload: dict):\n    cfg = {\"configurable\": {\"thread_id\": payload[\"session\"]}}\n    return app.invoke({\"messages\": [payload[\"msg\"]]}, cfg)\n```\n\n## 2. المراقبة\n- سجّل عدد العقد المنفّذة ووقت كل خطوة.\n- حدّد عدد حلقات التكرار بـ `should_continue` لتفادي الحلقات اللانهائية.\n- استخدم `MemorySaver` للاختبار وPostgres checkpointer في الإنتاج.\n\n## 3. الأمان\nلا تمرّر مفاتيح API مباشرة للنموذج؛ استخدم متغيرات بيئة وخادم وكلاء (proxy)."}], "slug": "langgraph-multi-agents"}
    </script>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/paywall.js"></script>
    <script>
        // Supabase Init loaded from config.js
        const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        function courseView() {
            return {
                course: {},
                activeModule: 0,
                hasAccess: false,
                user: null,

                async init() {
                    this.course = JSON.parse(document.getElementById('course-data').textContent);
                    if (!supabase) return;
                    
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.user = session.user;
                        const { data, error } = await supabase
                            .from('user_course_access')
                            .select('*')
                            .eq('course_slug', this.course.slug)
                            .maybeSingle();
                        if (data && !error) {
                            this.hasAccess = true;
                        }
                    }
                },

                renderMarkdown(md) {
                    return md ? marked.parse(md) : '';
                }
            }
        }
    </script>
</body>
</html>
