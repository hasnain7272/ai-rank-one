<script id="course-data" type="application/json">{"title": "بناء أنظمة الوكلاء المتعددة (Multi-Agents) باستخدام LangGraph", "description": "دورة هندسية: وكلاء متخصصون، ذاكرة جلسات، أدوات آمنة، ونشر قابل للمراقبة — بكود بايثون جاهز للإنتاج وللسوق العربي.", "tags": ["LangGraph", "Python", "Multi-Agent", "LLM Orchestration", "Production"], "price": 39, "duration": "8 ساعات", "gradient": "from-brand-500 to-indigo-500", "modules": [{"title": "الوحدة 1: المفاهيم الأساسية وهندسة الوكلاء", "content": "# المفاهيم الأساسية وهندسة الوكلاء\n\n## ماذا ستبني في هذه الدورة؟\nنظام **وكلاء متعددين** يتعاونون: باحث يجمع معلومات، مبرمج يكتب كوداً، مراجع يتحقق — عبر **LangGraph** برسم بياني واضح قابل للتتبع.\n\nهذه ليست دورة «شات مع GPT». الهدف: **هندسة أنظمة** تُشغَّل وتُباع.\n\n## لماذا Multi-Agent وليس نموذجاً واحداً؟\n| معيار | نموذج واحد | وكلاء متخصصون |\n|--------|------------|----------------|\n| التخصص | برومبت ضخم هش | كل وكيل يبرع في دور |\n| التصحيح | صندوق أسود | تتبّع عقدة بعقدة |\n| التكلفة | سياق طويل دائماً | سياق مختصر لكل دور |\n| الأمان | كل الأدوات متاحة | أدوات محدودة لكل وكيل |\n\n## LangGraph في جملة\n- **State**: حالة مشتركة (رسائل، نتائج، أعلام)\n- **Nodes**: دوال بايثون = وكلاء أو خطوات\n- **Edges**: انتقالات ثابتة أو شرطية\n\n```\n        ┌────────────┐\n START →│ researcher │──→ coder ──→ reviewer ──→ END\n        └────────────┘         ↑         │\n              └────────────────┘ (إعادة عند الرفض)\n```\n\n## إعداد بيئة احترافية\n\n```bash\npython -m venv .venv\npip install \"langgraph>=0.2\" \"langchain-openai>=0.2\" \"langchain-core>=0.3\"\n```\n\n## الحالة المشتركة — أساس كل شيء\n\n```python\nfrom typing import Annotated, TypedDict\nfrom langgraph.graph.message import add_messages\n\nclass AgentState(TypedDict):\n    messages: Annotated[list, add_messages]\n    task: str\n    research_notes: str\n    code_draft: str\n    review_ok: bool\n    iteration: int\n```\n\n`add_messages` يمنع استبدال السجل بالكامل في كل خطوة.\n\n## مبادئ تصميم قبل كتابة سطر\n1. مسؤولية واحدة لكل عقدة\n2. مخرج واضح في الـ State\n3. شرط توقف صريح (حد حلقات)\n4. أدوات بأقل صلاحية\n\n## تمرين\nعرّف `AgentState` محلياً. حدّد 3 أدوار لوكلاء من مشكلة في عملك قبل الوحدة 2.\n\n## مصادر إضافية (للتعمّق — اختَر 1–2 أسبوعياً)\n\n- **توثيق رسمي** — [LangGraph Concepts](https://langchain-ai.github.io/langgraph/concepts/low_level/)\n- **مقال / مدونة** — [LangGraph multi-agent workflows](https://blog.langchain.dev/langgraph-multi-agent-workflows/)\n- **ورقة بحثية** — [AutoGen (Microsoft) arXiv:2308.08155](https://arxiv.org/abs/2308.08155)\n- **فيديو** — [LangChain — Introduction to LangGraph](https://www.youtube.com/watch?v=5h-JBkySK34)\n- **بودكاست** — [Latent Space — agents](https://www.latent.space/)\n\n> نصيحة: طبّق كود الوحدة أولاً، ثم عد للمصدر لتربط النظرية بالتنفيذ.\n", "resources": [{"type": "docs", "title": "LangGraph Concepts", "url": "https://langchain-ai.github.io/langgraph/concepts/low_level/", "source": "توثيق رسمي"}, {"type": "blog", "title": "LangGraph multi-agent workflows", "url": "https://blog.langchain.dev/langgraph-multi-agent-workflows/", "source": "مقال / مدونة"}, {"type": "paper", "title": "AutoGen (Microsoft) arXiv:2308.08155", "url": "https://arxiv.org/abs/2308.08155", "source": "ورقة بحثية"}, {"type": "video", "title": "LangChain — Introduction to LangGraph", "url": "https://www.youtube.com/watch?v=5h-JBkySK34", "source": "فيديو"}, {"type": "podcast", "title": "Latent Space — agents", "url": "https://www.latent.space/", "source": "بودكاست"}]}, {"title": "الوحدة 2: بناء الرسم البياني وهيكلة العقد", "content": "", "resources": []}, {"title": "الوحدة 3: الذاكرة المستمرة وتبادل الرسائل", "content": "", "resources": []}, {"title": "الوحدة 4: دمج الأدوات (Tools) وحلقات التكرار", "content": "", "resources": []}, {"title": "الوحدة 5: النشر والمراقبة في الإنتاج", "content": "", "resources": []}], "slug": "langgraph-multi-agents"}</script>
<script src="../../assets/js/config.js"></script>
<script>
const sb = window.supabase.createClient(window.PUBLIC_CONFIG.SUPABASE_URL, window.PUBLIC_CONFIG.SUPABASE_ANON_KEY);
window.courseView = function(){return{
  course:{}, activeModule:0, hasAccess:false, user:null, loading:false, showAuth:false, otpSent:false, authEmail:'', authOTP:'', authError:'',
  init(){
    this.course = JSON.parse(document.getElementById('course-data').textContent);
    if(this.course?.slug) localStorage.setItem('last_course_slug', this.course.slug);
    this.$watch('activeModule', () => this.loadModule());
    sb.auth.getSession().then(({data}) => { this.user = data.session?.user||null; this.checkAccess(); });
    sb.auth.onAuthStateChange((e,s) => { this.user=s?.user||null; if(e==='SIGNED_IN') this.showAuth=false; this.checkAccess(); });
  },
  async checkAccess(){
    if(!this.user){ this.hasAccess=false; this.loadModule(); return; }
    const {data} = await sb.from('user_course_access').select('course_slug').in('course_slug',[this.course.slug,'*']);
    this.hasAccess = !!(data && data.length); this.loadModule();
  },
  async loadModule(){
    const i=this.activeModule; if(i===0) return;
    if(this.hasAccess && this.course.modules[i] && !this.course.modules[i].content){
      this.loading=true;
      const {data,error} = await sb.from('course_modules').select('content').eq('course_slug',this.course.slug).eq('module_index',i).single();
      if(!error && data) this.course.modules[i].content=data.content;
      this.loading=false;
    }
  },
  async sendOTP(){ this.loading=true; this.authError=''; try{ const {error}=await sb.auth.signInWithOtp({email:this.authEmail}); if(error) throw error; this.otpSent=true; }catch(e){ this.authError=e.message||'خطأ في الإرسال'; } this.loading=false; },
  async verifyOTP(){ this.loading=true; this.authError=''; try{ const {error}=await sb.auth.verifyOtp({email:this.authEmail,token:this.authOTP,type:'email'}); if(error) throw error; this.showAuth=false; }catch(e){ this.authError=e.message||'رمز خاطئ'; } this.loading=false; },
  async signOut(){ await sb.auth.signOut(); this.user=null; this.hasAccess=false; },
  renderMarkdown(md){ return md ? marked.parse(md) : ''; }
};};
</script>
