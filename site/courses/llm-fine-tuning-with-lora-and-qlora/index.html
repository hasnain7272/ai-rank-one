</head>
<body class="bg-surface-950 text-white font-arabic antialiased" x-data="courseView()">

    <!-- Navbar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-surface-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </div>
                <span class="text-lg font-bold bg-gradient-to-l from-brand-400 to-purple-400 bg-clip-text text-transparent">AI Rank One</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm text-surface-200 hover:text-white transition-colors">الرئيسية</a>
                <span x-show="user" class="text-sm text-surface-200" x-text="user.email"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-extrabold mb-4" x-text="course.title"></h1>
        <p class="text-surface-200 text-lg mb-8 leading-relaxed" x-text="course.description"></p>

        <!-- Module Navigation Tabs -->
        <div class="flex border-b border-white/10 mb-8 overflow-x-auto whitespace-nowrap">
            <template x-for="(mod, index) in course.modules" :key="index">
                <button
                    @click="activeModule = index"
                    class="py-3 px-4 text-sm font-semibold border-b-2 transition-colors"
                    :class="activeModule === index ? 'border-brand-500 text-brand-400' : 'border-transparent text-surface-200 hover:text-white'"
                    x-text="'الوحدة ' + (index + 1)"
                ></button>
            </template>
        </div>

        <!-- Render Content -->
        <div class="prose prose-invert max-w-none">
            <!-- Module Header -->
            <h2 class="text-xl font-bold mb-4" x-text="course.modules[activeModule]?.title"></h2>

            <!-- Module Body -->
            <div x-show="activeModule === 0 || hasAccess">
                <div x-html="renderMarkdown(course.modules[activeModule]?.content)"></div>
            </div>

            <!-- Paywall Overlay for Modules 2-5 -->
            <div x-show="activeModule > 0 && !hasAccess" class="p-8 rounded-2xl bg-gradient-to-br from-brand-950/20 to-purple-950/20 border border-brand-500/20 text-center my-8">
                <svg class="w-12 h-12 text-brand-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                <h3 class="text-xl font-bold mb-2">هذه الوحدة مغلقة</h3>
                <p class="text-surface-200 text-sm max-w-md mx-auto mb-6">اشترك الآن لفتح جميع الوحدات التقنية الأربعة الإضافية والحصول على الكود المصدري وشهادة الإتمام.</p>
                <a :href="'https://checkout.lemonsqueezy.com/checkout/buy/' + (window.PUBLIC_CONFIG?.LEMON_VARIANT_ID || 'VARIANT_ID') + '?checkout[custom][course_slug]=' + course.slug" id="checkout-btn" class="inline-block px-8 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 font-semibold text-white transition-all shadow-lg shadow-brand-600/25">
                    اشترك الآن مقابل 29$ فقط
                </a>
            </div>
        </div>
    </main>

    <!-- Script Data Injected by Compiler -->
    <script id="course-data" type="application/json">
    {"title": "ضبط النماذج اللغوية الكبيرة (Fine-Tuning) باستخدام LoRA وQLoRA", "description": "دورة عملية لضبط نماذج لغوية مفتوحة المصدر على مهام مخصصة باستخدام تقنيتي LoRA وQLoRA بتكلفة وحجم ذاكرة منخفضين.", "tags": ["Fine-Tuning", "LoRA", "QLoRA", "PEFT"], "price": 29, "duration": "5 ساعات", "gradient": "from-purple-500 to-pink-500", "modules": [{"title": "الوحدة 1: لماذا الضبط الدقيق وليس التلقين فقط؟", "content": "# لماذا الضبط الدقيق وليس التلقين فقط؟\n\n**التلقين (Prompting)** يكفي للمهام العامة، لكنه يفشل عند:\n- الحاجة لأسلوب أو تنسيق صارم ومتكرر.\n- بيانات حساسة لا تريد إرسالها لـ API خارجي.\n- استنتاج رخيص محلياً على أجهزة محدودة.\n\n## مفهوم الضبط\nنحدّث أوزان النموذج ببياناتنا. المشكلة: تدريب النموذج كاملاً مكلف جداً (مليارات المعاملات).\n\n## الحل: LoRA\nبدلاً من تحديث كل الأوزان، نضيف **مصفوفات صغيرة قابلة للتدريب** على طبقات الانتباه (Attention). النموذج الأصلي مجمّد.\n\n```python\n# LoRA تضيف معاملات بأضعاف أقل (أحياناً 0.1% من الحجم)\n# وتبقى أوزان الأساس دون تغيير\n```"}, {"title": "الوحدة 2: مبادئ LoRA والتمثيل منخفض الرتبة", "content": "# مبادئ LoRA والتمثيل منخفض الرتبة\n\nفكرة رياضية بسيطة: أي تحديث كبير للأوزان $\\Delta W$ يمكن تقريبه بجداء مصفوفتين صغيرتين $B \\cdot A$ برتبة منخفضة $r$.\n\n```python\nfrom peft import LoraConfig, get_peft_model\nfrom transformers import AutoModelForCausalLM\n\nmodel = AutoModelForCausalLM.from_pretrained(\"meta-llama/Llama-3.2-1B\")\n\nconfig = LoraConfig(\n    r=8,                      # رتبة منخفضة\n    lora_alpha=16,            # معامل التحجيم\n    target_modules=[\"q_proj\", \"v_proj\"],\n    lora_dropout=0.05,\n    bias=\"none\",\n    task_type=\"CAUSAL_LM\",\n)\nmodel = get_peft_model(model, config)\nmodel.print_trainable_parameters()  # يطبع: قابلة للتدريب 0.5%\n```"}, {"title": "الوحدة 3: QLoRA وتقليل استهلاك الذاكرة", "content": "# QLoRA وتقليل استهلاك الذاكرة\n\n**QLoRA** يجمع LoRA مع **تكميم 4-بت (NF4)** للنموذج الأساسي، فينخفض استهلاك الذاكرة بشكل هائل دون خسارة كبيرة في الجودة.\n\n```python\nfrom transformers import BitsAndBytesConfig\nimport torch\n\nbnb_config = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_quant_type=\"nf4\",\n    bnb_4bit_compute_dtype=torch.bfloat16,\n)\nmodel = AutoModelForCausalLM.from_pretrained(\n    \"meta-llama/Llama-3.2-7B\",\n    quantization_config=bnb_config,\n    device_map=\"auto\",\n)\nmodel = get_peft_model(model, config)  # نفس LoraConfig\n```\n\nبهذا تضبط نموذج 7 مليار معامل على GPU بذاكرة 8GB."}, {"title": "الوحدة 4: تجهيز البيانات وحلقة التدريب", "content": "# تجهيز البيانات وحلقة التدريب\n\n## تنسيق البيانات\nكل عيّنة: تلقين (instruction) + رد مطلوب.\n\n```python\nfrom datasets import load_dataset\nfrom trl import SFTTrainer, SFTConfig\n\ndata = load_dataset(\"json\", data_files=\"train.jsonl\")[\"train\"]\n\ntrainer = SFTTrainer(\n    model=model,\n    train_dataset=data,\n    args=SFTConfig(\n        output_dir=\"./llama-lora\",\n        per_device_train_batch_size=4,\n        max_seq_length=512,\n        num_train_epochs=3,\n        learning_rate=2e-4,\n        fp16=True,\n    ),\n)\ntrainer.train()\n```\n\n## نصائح\n- 200–500 عيّنة جيدة التنسيق أفضل من 10 آلاف عشوائية.\n- راقب فقدان التدريب (loss)؛ انخفاض حاد ثم استقرار = تدريب سليم."}, {"title": "الوحدة 5: الدمج والنشر والتقييم", "content": "# الدمج والنشر والتقييم\n\n## دمج المحوّل (Adapter) مع الأساس\n\n```python\nmerged = model.merge_and_unload()  # يدمج LoRA في الأوزان\nmerged.save_pretrained(\"./llama-merged\")\nmerged.push_to_hub(\"username/llama-arabic-lora\")\n```\n\nأو حمّل المحوّل منفصلاً لتوفير مساحة:\n\n```python\nmodel.load_adapter(\"./llama-lora\", adapter_name=\"ar\")\n```\n\n## التقييم\n- اختبر على عيّنات محجوزة (held-out) خارج بيانات التدريب.\n- قارن النموذج المضبوط بالأساس باستخدام تقييم بشري أو ROUGE/BLEU.\n- راقب **التهيّؤ (overfitting)**: إذا حفظ التدريب حرفياً لكنه يفشل على جديد، قلّل الحقب (epochs) أو زد `lora_dropout`."}], "slug": "llm-fine-tuning-with-lora-and-qlora"}
    </script>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/paywall.js"></script>
    <script>
        // Supabase Init loaded from config.js
        const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        function courseView() {
            return {
                course: {},
                activeModule: 0,
                hasAccess: false,
                user: null,

                async init() {
                    this.course = JSON.parse(document.getElementById('course-data').textContent);
                    if (!supabase) return;
                    
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.user = session.user;
                        const { data, error } = await supabase
                            .from('user_course_access')
                            .select('*')
                            .eq('course_slug', this.course.slug)
                            .maybeSingle();
                        if (data && !error) {
                            this.hasAccess = true;
                        }
                    }
                },

                renderMarkdown(md) {
                    return md ? marked.parse(md) : '';
                }
            }
        }
    </script>
</body>
</html>
