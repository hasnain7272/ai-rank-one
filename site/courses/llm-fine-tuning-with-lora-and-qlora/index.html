{"title": "ضبط نماذج اللغة الدقيقة مع LoRA وQLoRA للإنتاج", "description": "دورة هندسية مدفوعة: قرار Full FT مقابل LoRA/QLoRA، إعداد PEFT (rank/alpha/target modules)، بيانات SFT وحلقة transformers، مشروع محوّل نطاق عربي، ثم الدمج والتصدير والخدمة والتقييم وحساب التكلفة.", "tags": ["LoRA", "QLoRA", "PEFT", "Fine-tuning", "Transformers", "LLM", "Production"], "price": 39, "duration": "10 ساعات", "gradient": "from-violet-500 to-purple-500", "modules": [{"title": "الوحدة 1: Full FT مقابل LoRA/QLoRA ومتى تضبط النموذج", "content": "# الضبط الكامل مقابل LoRA/QLoRA — الحدس الرياضي ومتى تضبط النموذج\n\n## ماذا ستبني في هذه الدورة؟\nمساراً هندسياً لـ **Fine-tuning** عملي: متى تضبط ومتى يكفي RAG/البرومبت، حدس LoRA وQLoRA، إعداد PEFT (rank/alpha/target modules)، تجهيز البيانات وحلقة التدريب، مشروع محوّل نطاق (domain adapter)، ثم الدمج والتصدير والتقييم والتكلفة.\n\nهذه ليست «شغّل notebook وانسَ». الهدف: **قرارات إنتاج** + كود transformers/peft أسلوب حقيقي.\n\n## متى لا تحتاج Fine-tuning؟\n| الحاجة | الأنسب غالباً |\n|--------|----------------|\n| معرفة حديثة / مستندات خاصة | RAG |\n| تنسيق إخراج بسيط | برومبت + few-shot / JSON schema |\n| أسلوب أو اصطلاحات نطاق ثابتة | LoRA/QLoRA |\n| سلوك أداة معقّد + بيانات وفيرة | SFT (+ تفضيلات لاحقاً) |\n| تغيير قدرات أساسية للنموذج | Full FT أو نموذج أكبر — نادر ومكلف |\n\n**قاعدة ذهبية:** إن كانت المشكلة «لا يجد المعلومة» → RAG أولاً. إن كانت «يعرف لكن لا يتكلم بلسان نطاقك» → adapter.\n\n## Full Fine-Tuning: ماذا يتغيّر؟\nلكل طبقة خطية تقريباً لدينا أوزان `W` بحجم ضخم. التحديث الكامل:\n\n```\nW' = W + ΔW\n```\n\nحيث `ΔW` بنفس رتبة `W` تقريباً → ذاكرة مُحسِّن (Adam states) ضخمة، تخزين نسخة كاملة لكل تجربة، وخطر **نسيان كارثي** لما تعلّمه النموذج الأساس.\n\n## LoRA: تحديث منخفض الرتبة\nالفرضية: التحديث المفيد أثناء التكييف يعيش في فضاء منخفض الرتبة. بدلاً من تعلّم `ΔW` كاملة:\n\n```\nΔW ≈ B @ A\n```\n\n- `A` شكلها `(r, in)` و `B` شكلها `(out, r)` و **r << min(in, out)**\n- عدد المعاملات ≈ `r * (in + out)` بدل `in * out`\n- أثناء الاستدلال يمكن **دمج** `W + BA` فلا تكلفة إضافية للlatency بعد الدمج\n\n```python\n# حدس عددي — ليس تدريب حقيقي\nimport numpy as np\n\nrng = np.random.default_rng(0)\nin_f, out_f, r = 4096, 4096, 16\n# عدد عناصر ΔW الكاملة\nfull = in_f * out_f\n# LoRA\nlora = r * (in_f + out_f)\nprint(\"full params\", full)\nprint(\"lora params\", lora)\nprint(\"ratio\", round(lora / full, 6))\n# مثال: ~0.0078 → أقل من 1% من معاملات الطبقة\n```\n\n### alpha والقياس\nغالباً يُضرب التحديث بـ `alpha / r` (أو يُضبط عبر `lora_alpha` في PEFT) ليبقى تأثير الرتبة مستقراً عند تغيير `r`.\n\n```\nh = W x + scaling * (B (A x))\n```\n\n## QLoRA: LoRA + تكميم 4-bit للأساس\n- يُحمَّل النموذج الأساس مكمّماً (مثل NF4) لتوفير VRAM\n- تُدرَّب محوّلات LoRA بـ precision أعلى (غالباً BF16/FP16 للحسابات)\n- النتيجة: ضبط 7B–70B على بطاقة واحدة أو قليلة — مع حذر من فقدان جودة التكميم\n\n## مقارنة سريعة للقرار\n\n```python\nfrom dataclasses import dataclass\n\n\n@dataclass\nclass FtDecision:\n    use_rag: bool\n    use_lora: bool\n    use_full_ft: bool\n    reason: str\n\n\ndef decide(need_private_knowledge: bool, need_style_or_format: bool,\n           has_labeled_sft: bool, huge_budget: bool) -> FtDecision:\n    if need_private_knowledge and not need_style_or_format:\n        return FtDecision(True, False, False, \"RAG أولاً للمحتوى المتغيّر\")\n    if need_style_or_format and has_labeled_sft:\n        return FtDecision(need_private_knowledge, True, False, \"LoRA/QLoRA للنمط + RAG إن لزم\")\n    if huge_budget and has_labeled_sft and not need_private_knowledge:\n        return FtDecision(False, False, True, \"Full FT نادر — تجربة كبيرة فقط\")\n    return FtDecision(True, False, False, \"ابدأ برومبت/RAG — اجمع بيانات قبل الضبط\")\n```\n\n## تكاليف خفية يتجاهلها المبتدئ\n1. **جمع وتنظيف البيانات** أغلى من GPU.\n2. **تقييم** قبل/بعد على مجموعة ثابتة — وإلا «صار أحلى» وهم.\n3. **إصدار المحوّلات** (base model revision + rank + data hash).\n4. **الامتثال**: بيانات تدريب قد تحتوي PII.\n\n## قائمة تحقق الوحدة 1\n- [ ] كتبت مشكلة منتج بجملة: RAG أم LoRA أم الاثنان؟\n- [ ] فهمت أن LoRA ≈ BA منخفضة الرتبة\n- [ ] حسبت نسبة المعاملات لطبقة 4096×4096 عند r=8 و r=64\n- [ ] عرّفت مقياس نجاح قبل أي `trainer.train()`\n\n## تمرين\nاختر حالة عربية (دعم فني، عقود، طب عام تثقيفي). اكتب:\n1) 20 مثالاً لـ SFT (input/output)\n2) 10 أسئلة تقييم\n3) قرار: LoRA فقط / RAG فقط / هجين — مع تبرير سطرين\n\n## مصادر إضافية (للتعمّق — اختَر 1–2 أسبوعياً)\n\n- **ورقة بحثية** — [LoRA: Low-Rank Adaptation arXiv:2106.09685](https://arxiv.org/abs/2106.09685)\n- **ورقة بحثية** — [QLoRA arXiv:2305.14314](https://arxiv.org/abs/2305.14314)\n- **توثيق رسمي** — [Hugging Face PEFT overview](https://huggingface.co/docs/peft/index)\n- **مقال / مدونة** — [Hugging Face — Parameter-Efficient Fine-Tuning using PEFT](https://huggingface.co/blog/peft)\n- **فيديو** — [Efficient Fine-Tuning — LoRA & QLoRA (Hugging Face)](https://www.youtube.com/watch?v=Us5ZFp16PaU)\n- **بودكاست** — [Latent Space — fine-tuning era](https://www.latent.space/)\n\n> نصيحة: طبّق كود الوحدة أولاً، ثم عد للمصدر لتربط النظرية بالتنفيذ.\n", "resources": [{"type": "paper", "title": "LoRA: Low-Rank Adaptation arXiv:2106.09685", "url": "https://arxiv.org/abs/2106.09685", "source": "ورقة بحثية"}, {"type": "paper", "title": "QLoRA arXiv:2305.14314", "url": "https://arxiv.org/abs/2305.14314", "source": "ورقة بحثية"}, {"type": "docs", "title": "Hugging Face PEFT overview", "url": "https://huggingface.co/docs/peft/index", "source": "توثيق رسمي"}, {"type": "blog", "title": "Hugging Face — Parameter-Efficient Fine-Tuning using PEFT", "url": "https://huggingface.co/blog/peft", "source": "مقال / مدونة"}, {"type": "video", "title": "Efficient Fine-Tuning — LoRA & QLoRA (Hugging Face)", "url": "https://www.youtube.com/watch?v=Us5ZFp16PaU", "source": "فيديو"}, {"type": "podcast", "title": "Latent Space — fine-tuning era", "url": "https://www.latent.space/", "source": "بودكاست"}]}, {"title": "الوحدة 2: إعداد PEFT/LoRA والـ target modules والرتبة", "content": "", "resources": []}, {"title": "الوحدة 3: تجهيز البيانات وحلقة التدريب والإخفاقات", "content": "", "resources": []}, {"title": "الوحدة 4: مشروع محوّل نطاق (Domain Adapter) متكامل", "content": "", "resources": []}, {"title": "الوحدة 5: الدمج والتصدير والخدمة والتقييم والتكلفة", "content": "", "resources": []}], "slug": "llm-fine-tuning-with-lora-and-qlora"}
</script>

<script>
const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.courseView = function(){return{
  course:{}, activeModule:0, hasAccess:false, user:null, loading:false,
  showAuth:false, otpSent:false, authEmail:'', authOTP:'', authError:'',
  init(){
    this.course = JSON.parse(document.getElementById('course-data').textContent);
    this.$watch('activeModule', () => this.loadModule());
    sb.auth.getSession().then(({data}) => { this.user = data.session?.user||null; this.checkAccess(); });
    sb.auth.onAuthStateChange((e,s) => { this.user=s?.user||null; if(e==='SIGNED_IN') this.showAuth=false; this.checkAccess(); });
  },
  async checkAccess(){
    if(!this.user){ this.hasAccess=false; this.loadModule(); return; }
    const {data} = await sb.from('user_course_access').select('*').eq('course_slug',this.course.slug).maybeSingle();
    this.hasAccess = !!data; this.loadModule();
  },
  async loadModule(){
    const i=this.activeModule; if(i===0) return;
    if(this.hasAccess && this.course.modules[i] && !this.course.modules[i].content){
      this.loading=true;
      const {data,error} = await sb.from('course_modules').select('content').eq('course_slug',this.course.slug).eq('module_index',i).single();
      if(!error && data) this.course.modules[i].content=data.content;
      this.loading=false;
    }
  },
  async sendOTP(){ this.loading=true; this.authError=''; try{ const {error}=await sb.auth.signInWithOtp({email:this.authEmail}); if(error) throw error; this.otpSent=true; }catch(e){ this.authError=e.message||'خطأ'; } this.loading=false; },
  async verifyOTP(){ this.loading=true; this.authError=''; try{ const {error}=await sb.auth.verifyOtp({email:this.authEmail,token:this.authOTP,type:'email'}); if(error) throw error; this.showAuth=false; }catch(e){ this.authError=e.message||'رمز خاطئ'; } this.loading=false; },
  async signOut(){ await sb.auth.signOut(); this.user=null; this.hasAccess=false; },
  renderMarkdown(md){ return md ? marked.parse(md) : ''; }
};};
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));}
</script>
