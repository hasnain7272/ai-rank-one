        <div class="prose prose-invert max-w-none">

            <h2 class="text-xl font-bold mb-4" x-text="course.modules[activeModule]?.title"></h2>

            <!-- Module Body -->

    <!-- Script Data Injected by Compiler -->
    <script id="course-data" type="application/json">
    {"title": "ضبط النماذج اللغوية الكبيرة باستخدام LoRA و QLoRA", "description": "دليل هندسي متكامل لضبط وتدريب النماذج اللغوية الكبيرة (LLMs) على بياناتك الخاصة باستخدام تقنيات التدريب منخفض الرتبة لتوفير موارد كرت الشاشة وتسريع عملية التدريب.", "tags": ["Fine-tuning", "LoRA", "QLoRA", "PyTorch", "HuggingFace"], "price": 39, "duration": "4 ساعات", "gradient": "from-green-500 to-emerald-500", "modules": [{"title": "الوحدة 1: مقدمة في ضبط النماذج (Fine-tuning) والقيود المفروضة على الموارد", "content": "# مقدمة في ضبط النماذج والقيود المفروضة على الموارد\n\nتعد عملية الضبط الدقيق (Fine-tuning) للنماذج اللغوية الكبيرة ضرورية لتكييف النماذج مع مهام محددة أو أساليب لغوية خاصة. ولكن، التدريب الكامل لكافة معلمات النموذج (Full Parameter Fine-tuning) يتطلب موارد حوسبية هائلة وكروت شاشة بمساحات ذاكرة ضخمة.\n\n## التحدي: متطلبات الذاكرة لكروت الشاشة (VRAM)\nأثناء التدريب، لا يتم حفظ أوزان النموذج فقط، بل يتم أيضاً تخزين:\n1. **التدرجات (Gradients)**.\n2. **حالات المحسن (Optimizer States)** مثل AdamW.\n3. **التنشيطات (Activations)** الناتجة عن التمرير الأمامي.\n\nعلى سبيل المثال، لتدريب نموذج بحجم 7 مليار معلمة (7B) بالدقة الكاملة (FP32)، قد تحتاج إلى أكثر من 80 جيجابايت من الذاكرة العشوائية لكرت الشاشة (VRAM)، وهو ما يتجاوز كروت الشاشة الاستهلاكية.\n\n## الحل: التكيف منخفض الرتبة (LoRA)\nتقوم تقنية LoRA بتثبيت أوزان النموذج الأصلي وإضافة مصفوفات تحديث صغيرة منخفضة الرتبة (Low-rank decomposition matrices) في طبقات الانتباه (Attention Layers)، مما يقلل المعلمات القابلة للتدريب بنسبة تصل إلى 99.9% دون خسارة تذكر في دقة النموذج.\n\n```python\n# فكرة عمل تحديث أوزان LoRA رياضياً وبشكل مبسط\nclass LoRALayer:\n    def __init__(self, in_features, out_features, r=8, alpha=16):\n        self.r = r  # الرتبة المنخفضة\n        self.scaling = alpha / r\n        # المصفوفات المضافة القابلة للتدريب\n        self.lora_A = [[0.0] * r for _ in range(in_features)]\n        self.lora_B = [[0.0] * out_features for _ in range(r)]\n        \n    def forward(self, x, base_weight_output):\n        # الوزن النهائي = الوزن الأصلي الثابت + (A * B) * معامل القياس\n        lora_output = (x @ self.lora_A @ self.lora_B) * self.scaling\n        return base_weight_output + lora_output\n```"}, {"title": "الوحدة 2: فهم خوارزمية LoRA والرياضيات خلفها", "content": "# فهم خوارزمية LoRA والرياضيات خلفها\n\nسنتعمق في هذه الوحدة في تفاصيل تفكيك المصفوفات ذات الرتبة المنخفضة وكيفية دمج المصفوفات المدربة वापस مع أوزان النموذج الأساسي لضمان عدم وجود أي زمن استجابة إضافي أثناء الاستدلال (Inference)."}, {"title": "الوحدة 3: التكميم ونظام QLoRA لتقليل استهلاك الذاكرة", "content": "# التكميم ونظام QLoRA لتقليل استهلاك الذاكرة\n\nامتداداً لـ LoRA، تقدم تقنية QLoRA تكميماً للنموذج الأساسي إلى دقة 4-bit (باستخدام نوع البيانات NF4 المخصص للنماذج اللغوية) مع إبقاء مصفوفات LoRA بدقة 16-bit.\n\nتتيح لك هذه التقنية تدريب نموذج 70B على كرت شاشة استهلاكي واحد بذاكرة 24 جيجابايت فقط."}, {"title": "الوحدة 4: تطبيق عملي للتدريب باستخدام PEFT و TRL", "content": "# تطبيق عملي للتدريب باستخدام PEFT و TRL\n\nكتابة كود التدريب الكامل باستخدام مكتبات HuggingFace:\n- `transformers` لتحميل النموذج والتكميم.\n- `peft` لإعداد طبقات LoRA.\n- `trl` واستخدام `SFTTrainer` لتشغيل عملية التدريب على مجموعة بيانات مخصصة."}, {"title": "الوحدة 5: تقييم النموذج المضبوط وحفظ الأوزان ومشاركتها", "content": "# تقييم النموذج المضبوط وحفظ الأوزان ومشاركتها\n\nكيف نقوم بتقييم أداء النموذج الجديد والتأكد من خلوه من ظاهرة التدهور المعرفي (Catastrophic Forgetting)، ومن ثم دمج الأوزان وحفظ النموذج بصيغة GGUF لتشغيله محلياً."}], "slug": "llm-fine-tuning-with-lora-and-qlora"}
    </script>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/paywall.js"></script>
    <script>
        // Supabase Init loaded from config.js
        const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        function courseView() {
            return {
                course: {},
                activeModule: 0,
                hasAccess: false,
                user: null,

                async init() {
                    this.course = JSON.parse(document.getElementById('course-data').textContent);
                    if (!supabase) return;
                    
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.user = session.user;
                        const { data, error } = await supabase
                            .from('user_course_access')
                            .select('*')
                            .eq('course_slug', this.course.slug)
                            .maybeSingle();
                        if (data && !error) {
                            this.hasAccess = true;
                        }
                    }
                },

                renderMarkdown(md) {
                    return md ? marked.parse(md) : '';
                }
            }
        }
    </script>
</body>
