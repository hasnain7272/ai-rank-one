<body class="bg-surface-950 text-white font-arabic antialiased" x-data="courseView()">

     <!-- Navbar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-surface-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <a href="../../index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </div>
                <span class="text-lg font-bold bg-gradient-to-l from-brand-400 to-purple-400 bg-clip-text text-transparent">AI Rank One</span>

            <div class="flex items-center gap-6">
                <a href="../../index.html" class="text-sm text-surface-200 hover:text-white transition-colors">الرئيسية</a>

            </div>
        </div>

    <!-- Main Content -->
    <main class="pt-24 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-extrabold mb-4" x-text="course.title"></h1>
        <p class="text-surface-200 text-lg mb-8 leading-relaxed" x-text="course.description"></p>

        <!-- Module Navigation Tabs -->
        <div class="flex border-b border-white/10 mb-8 overflow-x-auto whitespace-nowrap">
            <template x-for="(mod, index) in course.modules" :key="index">
                <button
                    @click="activeModule = index"
                    class="py-3 px-4 text-sm font-semibold border-b-2 transition-colors"
                    :class="activeModule === index ? 'border-brand-500 text-brand-400' : 'border-transparent text-surface-200 hover:text-white'"
                    x-text="'الوحدة ' + (index + 1)"
                ></button>
            </template>
        </div>

        <!-- Render Content -->
        <div class="prose prose-invert max-w-none">
            <!-- Module Header -->
            <h2 class="text-xl font-bold mb-4" x-show="course.modules && course.modules[activeModule]" x-text="course.modules[activeModule]?.title"></h2>
            <h2 class="text-xl font-bold mb-4" x-show="!course.modules || !course.modules[activeModule]">جارٍ التحميل...</h2>

            <!-- Module Body -->
            <div x-show="(activeModule === 0 || hasAccess) && course.modules && course.modules[activeModule]">
                <div x-html="renderMarkdown(course.modules[activeModule]?.content)"></div>
            </div>

            <!-- Paywall Overlay for Modules 2-5 -->
            <div x-show="activeModule > 0 && !hasAccess && course.slug" class="p-8 rounded-2xl bg-gradient-to-br from-brand-950/20 to-purple-950/20 border border-brand-500/20 text-center my-8">
                <svg class="w-12 h-12 text-brand-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                <h3 class="text-xl font-bold mb-2">هذه الوحدة مغلقة</h3>
                <p class="text-surface-200 text-sm max-w-md mx-auto mb-6">أدخل بريدك الإلكتروني للاشتراك مجاناً وفتح كامل الدورة وكود المصدر فوراً!</p>
                
                <form @submit.prevent="subscribeFree()" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                    <input
                        type="email"
                        x-model="subscribeEmail"
                        required
                        placeholder="بريدك الإلكتروني"
                        class="flex-1 px-4 py-3 rounded-xl bg-surface-800 border border-white/10 text-white placeholder:text-surface-700 focus:outline-none focus:border-brand-500/50 focus:ring-1 focus:ring-brand-500/50 text-sm"
                        dir="ltr"
                    >
                    <button type="submit" class="px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-sm font-semibold text-white transition-all shrink-0" :disabled="loading">
                        <span x-show="!loading">اشترك وتابع مجاناً</span>
                        <span x-show="loading">جاري الإرسال...</span>
                    </button>
                </form>
                <p x-show="message" x-text="message" class="mt-3 text-xs text-brand-300"></p>
            </div>
        </div>
    </main>

    <!-- Script Data Injected by Compiler -->
    <script id="course-data" type="application/json">
    {"title": "دورة متقدمة في LLM Fine-tuning with LoRA and QLoRA", "description": "دورة عملية متقدمة مصممة لمهندسي البرمجيات العرب لتغطية أساسيات وتطبيقات LLM Fine-tuning with LoRA and QLoRA في بيئات العمل الفعلية.", "tags": ["LLM", "Python", "Mute"], "price": 29, "duration": "4 ساعات", "gradient": "from-brand-500 to-indigo-500", "modules": [{"title": "الوحدة 1: المقدمة والمفاهيم الأساسية", "content": "# مقدمة في LLM Fine-tuning with LoRA and QLoRA\n\nنظرة عامة على المفاهيم والركائز الأساسية لـ LLM Fine-tuning with LoRA and QLoRA وكيفية إعداد البيئة البرمجية للعمل.\n\n## الأساسيات:\n- فهم المشكلة التي يحلها هذا المفهوم.\n- البنية الهندسية العامة.\n\n```python\n# إعداد أولي لبدء العمل\ndef init_model():\n    print('تهيئة نظام LLM Fine-tuning with LoRA and QLoRA...')\n    return True\n```"}, {"title": "الوحدة 2: الهيكل الهندسي والتصميم المتقدم", "content": "# الهيكل الهندسي والتصميم المتقدم لـ LLM Fine-tuning with LoRA and QLoRA\n\nشرح تفصيلي لتصميم وهيكلة الحلول البرمجية بالاعتماد على أفضل الممارسات التقنية."}, {"title": "الوحدة 3: التحديات والمشاكل وحلولها", "content": "# التحديات والمشاكل وحلولها\n\nكيفية التعامل مع الأخطاء الشائعة وحل المشكلات المتعلقة بالأداء وتخفيض زمن الاستجابة."}, {"title": "الوحدة 4: مشروع عملي تطبيقي متكامل", "content": "# مشروع عملي تطبيقي متكامل لـ LLM Fine-tuning with LoRA and QLoRA\n\nخطوات بناء مشروع كامل مع الكود البرمجي وشرح مفصل لربط الأجزاء ببعضها."}, {"title": "الوحدة 5: النشر والتشغيل والمراقبة في الإنتاج", "content": "# النشر والتشغيل والمراقبة في بيئة الإنتاج\n\nكيفية تغليف الكود ونشره على السحابة ومراقبة الأداء لضمان الكفاءة والدقة المستمرة."}], "slug": "llm-fine-tuning-with-lora-and-qlora"}
    </script>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/paywall.js"></script>
    <script>
        // Supabase Init loaded from config.js
        const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        function courseView() {
            return {
                course: {},
                activeModule: 0,
                hasAccess: false,
                user: null,
                subscribeEmail: '',
                loading: false,
                message: '',

                async init() {
                    this.course = JSON.parse(document.getElementById('course-data').textContent);
                    if (!supabase) {
                        // Offline/demo fallback
                        this.hasAccess = true;
                        return;
                    }
                    
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.user = session.user;
                        this.hasAccess = true;
                    }

                    // Listen for auth changes
                    supabase.auth.onAuthStateChange((event, session) => {
                        this.user = session?.user || null;
                        if (session) {
                            this.hasAccess = true;
                        }
                    });
                },

                async subscribeFree() {
                    if (!this.subscribeEmail) return;
                    this.loading = true;
                    this.message = '';

                    try {
                        // 1. Add to subscribers database
                        await supabase.from('subscribers').upsert({
                            email: this.subscribeEmail,
                            subscribed_at: new Date().toISOString()
                        });

                        // 2. Send Magic Link
                        const { error } = await supabase.auth.signInWithOtp({
                            email: this.subscribeEmail
                        });

                        if (error) throw error;
                        this.message = 'تم إرسال رابط التفعيل لبريدك الإلكتروني! اضغط على الرابط لتسجيل الدخول فوراً.';
                    } catch (e) {
                        this.message = 'حدث خطأ أثناء الإرسال: ' + (e.message || e);
                    }
                    this.loading = false;
                },

                renderMarkdown(md) {
                    return md ? marked.parse(md) : '';
                }
            }
        }
    </script>
