                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>

    <!-- Main Content -->
    <main class="pt-24 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Render Content -->
        <div class="prose prose-invert max-w-none">
            <!-- Module Header -->
            <h2 class="text-xl font-bold mb-4" x-text="course.modules[activeModule]?.title"></h2>

            <!-- Module Body -->
            <div x-show="activeModule === 0 || hasAccess">
                <div x-html="renderMarkdown(course.modules[activeModule]?.content)"></div>
            </div>

            <!-- Paywall Overlay for Modules 2-5 -->
            <div x-show="activeModule > 0 && !hasAccess" class="p-8 rounded-2xl bg-gradient-to-br from-brand-950/20 to-purple-950/20 border border-brand-500/20 text-center my-8">
                <svg class="w-12 h-12 text-brand-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                <h3 class="text-xl font-bold mb-2">هذه الوحدة مغلقة</h3>

                <a :href="'https://checkout.lemonsqueezy.com/checkout/buy/' + (window.PUBLIC_CONFIG?.LEMON_VARIANT_ID || 'VARIANT_ID') + '?checkout[custom][course_slug]=' + course.slug" id="checkout-btn" class="inline-block px-8 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 font-semibold text-white transition-all shadow-lg shadow-brand-600/25">
                    اشترك الآن مقابل 49$ فقط

    <!-- Script Data Injected by Compiler -->
    <script id="course-data" type="application/json">
    {"title": "بناء نظام RAG للإنتاج مع البحث الهجين وإعادة الترتيب", "description": "دورة هندسية متقدمة في بناء أنظمة الاسترجاع المعزز بالتوليد (RAG) القابلة للتطوير للتعامل مع ملايين المستندات بزمن استجابة منخفض ودقة عالية.", "tags": ["RAG", "Vector DB", "Hybrid Search", "Reranking"], "price": 49, "duration": "5 ساعات", "gradient": "from-purple-500 to-pink-500", "modules": [{"title": "الوحدة 1: بنية أنظمة RAG للإنتاج وتحدياتها", "content": "# بنية أنظمة RAG للإنتاج وتحدياتها\n\nتعد أنظمة الاسترجاع المعزز بالتوليد (Retrieval-Augmented Generation) معياراً لتزويد النماذج اللغوية بمعلومات محدثة وخاصة. في بيئة الإنتاج، يواجه المهندسون تحديات جمة تتعلق بزمن الاستجابة (Latency)، ودقة الاسترجاع، وتكلفة المعالجة.\n\n## التحديات الأساسية في الإنتاج:\n- **فقدان السياق في الوسط (Lost in the Middle)**: النماذج اللغوية تميل لتجاهل المعلومات الموجودة في وسط السياق الممرر.\n- **البحث الدلالي غير الكافي**: قد يفشل البحث عن طريق المتجهات (Vector Search) في مطابقة الكلمات المفتاحية الدقيقة (مثل الأرقام التسلسلية أو أسماء المنتجات).\n- **زمن الاستجابة**: عمليات الاستعلام المتعددة وإعادة الترتيب (Reranking) تزيد من زمن الاستجابة الكلي.\n\n## الحل: البحث الهجين (Hybrid Search)\nالبحث الهجين يدمج بين طريقتين:\n1. **البحث الكثيف (Dense Retrieval)**: باستخدام Embeddings لتمثيل المعنى الدلالي.\n2. **البحث الخفيف (Sparse Retrieval)**: باستخدام خوارزميات مثل BM25 لمطابقة الكلمات المفتاحية بدقة.\n\n```python\n# صيغة دمج نتائج البحث الهجين باستخدام Reciprocal Rank Fusion (RRF)\ndef rrf(dense_results, sparse_results, k=60):\n    rrf_score = {}\n    # حساب النقاط بناءً على ترتيب النتائج\n    for rank, doc in enumerate(dense_results):\n        rrf_score[doc] = rrf_score.get(doc, 0) + 1.0 / (k + rank + 1)\n    for rank, doc in enumerate(sparse_results):\n        rrf_score[doc] = rrf_score.get(doc, 0) + 1.0 / (k + rank + 1)\n    return sorted(rrf_score.items(), key=lambda x: x[1], reverse=True)\n```"}, {"title": "الوحدة 2: تقنيات تقسيم المستندات وتوليد المتجهات المتقدمة", "content": "# تقنيات تقسيم المستندات وتوليد المتجهات المتقدمة\n\nتعتمد جودة RAG بشكل كامل على جودة تقسيم البيانات (Chunking). التقسيم العشوائي يؤدي إلى تدمير السياق الدلالي للمعلومات.\n\n## تقنيات التقسيم الذكي:\n1. **التقسيم الدلالي (Semantic Chunking)**: تقسيم النص بناءً على تغيرات الموضوع أو الفقرات بدلاً من عدد الحروف.\n2. **التقسيم المتداخل (Overlapping)**: المحافظة على نسبة تداخل (مثلاً 10-20%) بين الأجزاء لضمان استمرارية المعنى.\n\n```python\n# مثال على تقسيم النص مع التداخل\ndef chunk_text(text, chunk_size=500, overlap=50):\n    chunks = []\n    start = 0\n    while start < len(text):\n        end = start + chunk_size\n        chunks.append(text[start:end])\n        start += chunk_size - overlap\n    return chunks\n```"}, {"title": "الوحدة 3: البحث الهجين وتطبيق خوارزمية RRF للدمج", "content": "# البحث الهجين وتطبيق خوارزمية RRF للدمج\n\nكيف نقوم بدمج نتائج البحث النصي التقليدي (BM25) مع البحث المتجهي في قاعدة بيانات واحدة مثل pgvector أو Pinecone؟\n\nسنتعرف في هذه الوحدة على إعدادات البحث الهجين وكتابة الاستعلامات المخصصة باستخدام SQL و Python لربط النتائج وتصفيتها."}, {"title": "الوحدة 4: تحسين النتائج باستخدام نماذج إعادة الترتيب (Reranking)", "content": "# تحسين النتائج باستخدام نماذج إعادة الترتيب (Reranking)\n\nالبحث المتجهي سريع ولكنه ليس دائماً دقيقاً للغاية. نستخدم نماذج إعادة الترتيب (Rerankers) مثل Cohere Rerank أو BAAI/bge-rerender لإعادة ترتيب أفضل 50 نتيجة مسترجعة.\n\nتعد هذه الخطوة هي الأكثر تأثيراً في زيادة دقة النظام وتقليل استهلاك الرموز غير الضرورية."}, {"title": "الوحدة 5: تقييم أنظمة RAG ومراقبتها في الإنتاج", "content": "# تقييم أنظمة RAG ومراقبتها في الإنتاج\n\nلا يمكنك تحسين ما لا يمكنك قياسه. سنتعلم استخدام إطار عمل Ragas لتقييم:\n1. **Faithfulness**: هل الإجابة مبنية بالكامل على السياق المسترجع؟\n2. **Answer Relevance**: هل الإجابة تجيب مباشرة على سؤال المستخدم؟\n3. **Context Recall**: هل نجح النظام في استرجاع جميع المعلومات المطلوبة؟"}], "slug": "building-a-production-rag-system"}
    </script>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/paywall.js"></script>
    <script>
        // Supabase Init loaded from config.js
        const SUPABASE_URL = window.PUBLIC_CONFIG?.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY;
        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        function courseView() {
            return {
                course: {},
                activeModule: 0,
                hasAccess: false,
                user: null,

                async init() {
                    this.course = JSON.parse(document.getElementById('course-data').textContent);
                    if (!supabase) return;
                    
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.user = session.user;
                        const { data, error } = await supabase
                            .from('user_course_access')
                            .select('*')
                            .eq('course_slug', this.course.slug)
                            .maybeSingle();
                        if (data && !error) {
                            this.hasAccess = true;
                        }
                    }
                },

                renderMarkdown(md) {
                    return md ? marked.parse(md) : '';
                }
            }
        }
    </script>
</body>
</html>
