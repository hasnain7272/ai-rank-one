<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحقق من الشهادة | AI Rank One</title>
<meta name="description" content="تحقق من صحة شهادة إتمام الدورة من منصة AI Rank One.">
<link rel="canonical" href="https://ai-rank-one.hasnainrazalakhani7272.workers.dev/verify.html"><link rel="icon" type="image/svg+xml" href="/assets/images/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="/assets/js/config.js"></script>
<style>*{font-family:'IBM Plex Sans Arabic',sans-serif}</style>
</head>
<body class="bg-slate-950 text-white" x-data="verifyApp()" x-init="init()">
<nav class="fixed top-0 inset-x-0 z-50 bg-slate-950/80 backdrop-blur border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold text-blue-400">AI Rank One</a>
    <div class="flex items-center gap-6 text-sm">
      <a href="index.html#courses" class="text-slate-200 hover:text-white">الدورات</a>
      <a href="glossary.html" class="text-slate-200 hover:text-white">القاموس التقني</a>
    </div>
  </div>
</nav>
<main class="pt-24 pb-20 max-w-lg mx-auto px-4 text-center">
  <h1 class="text-2xl font-bold mb-2">تحقق من صحة الشهادة</h1>
  <p class="text-slate-300 text-sm mb-6">أدخل رمز الشهادة المطبوع على الشهادة</p>
  <form @submit.prevent="verifyCert()" class="flex gap-3 mb-8">
    <input type="text" x-model="certCode" required placeholder="رمز الشهادة (مثال: CERT-ABC123)" dir="ltr" class="flex-1 px-4 py-3 rounded-xl bg-slate-900 border border-white/10 text-white text-sm">
    <button class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 font-semibold text-sm" :disabled="loading">تحقق</button>
  </form>
  <div x-show="result === 'valid'" class="p-6 rounded-2xl bg-green-500/10 border border-green-500/20 text-right space-y-2 text-sm">
    <h3 class="text-lg font-bold text-green-400 mb-3">شهادة معتمدة وصالحة ✓</h3>
    <div><span class="text-slate-400">الاسم:</span> <strong x-text="certData.name"></strong></div>
    <div><span class="text-slate-400">الدورة:</span> <strong x-text="certData.course"></strong></div>
    <div><span class="text-slate-400">التاريخ:</span> <strong x-text="certData.date" dir="ltr"></strong></div>
  </div>
  <div x-show="result === 'invalid'" class="p-6 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold">لم نتمكن من العثور على شهادة بهذا الرمز.</div>
  <div x-show="result === 'error'" class="p-6 rounded-2xl bg-amber-500/10 border border-amber-500/20 text-amber-400 text-sm" x-text="errorMsg"></div>
</main>
<script>
const sb = window.supabase.createClient(window.PUBLIC_CONFIG?.SUPABASE_URL, window.PUBLIC_CONFIG?.SUPABASE_ANON_KEY);
function verifyApp(){return{
  certCode:'', result:null, loading:false, certData:{}, errorMsg:'',
  init(){
    const code = new URLSearchParams(window.location.search).get('code');
    if(code){ this.certCode = code; this.verifyCert(); }
  },
  async verifyCert(){
    if(!this.certCode) return; this.loading = true; this.result = null;
    try {
      const {data, error} = await sb.from('certificates').select('*').eq('code', this.certCode.trim()).single();
      if(error || !data){ this.result = 'invalid'; } else { this.certData = data; this.result = 'valid'; }
    } catch(e){ this.result = 'error'; this.errorMsg = 'تعذر الاتصال بمركز التحقق.'; }
    this.loading = false;
  }
};}
</script>
</body>
</html>
