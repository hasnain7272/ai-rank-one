<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاموس المصطلحات التقنية | AI Rank One</title>
<meta name="description" content="قاموس المصطلحات الفنية للذكاء الاصطناعي وتعلم الآلة مع الشرح باللغة العربية.">
<link rel="canonical" href="https://ai-rank-one.hasnainrazalakhani7272.workers.dev/glossary.html"><link rel="icon" type="image/svg+xml" href="/assets/images/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>*{font-family:'IBM Plex Sans Arabic',sans-serif}</style>
</head>
<body class="bg-slate-950 text-white" x-data="glossaryApp()">
<nav class="fixed top-0 inset-x-0 z-50 bg-slate-950/80 backdrop-blur border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold text-blue-400">AI Rank One</a>
    <div class="flex items-center gap-6 text-sm">
      <a href="index.html" class="text-slate-200 hover:text-white">الرئيسية</a>
      <a href="index.html#courses" class="text-slate-200 hover:text-white">الدورات</a>
    </div>
  </div>
</nav>
<main class="pt-24 pb-20 max-w-5xl mx-auto px-4">
  <div class="text-center mb-10">
    <h1 class="text-3xl font-bold mb-3">قاموس مصطلحات الذكاء الاصطناعي</h1>
    <p class="text-slate-300 text-sm max-w-xl mx-auto mb-6">دليلك التقني لترجمة وفهم مصطلحات RAG، Fine-Tuning، والـ MLOps بالعربية الفصحى.</p>
    <input type="text" x-model="search" placeholder="ابحث بالإنجليزية أو العربية (مثال: RAG)..." class="w-full max-w-md px-4 py-3 rounded-xl bg-slate-900 border border-white/10 text-white text-sm">
  </div>
  <div class="grid md:grid-cols-2 gap-4">
    <template x-for="t in filteredTerms()" :key="t.en">
      <div class="p-5 rounded-2xl bg-slate-900 border border-white/5">
        <h2 class="text-lg font-bold text-blue-400" x-text="t.en"></h2>
        <h3 class="text-xs font-semibold text-slate-400 mb-2" x-text="t.ar"></h3>
        <p class="text-sm text-slate-300 leading-relaxed" x-text="t.def"></p>
        <template x-if="t.link"><a :href="t.link" class="inline-block mt-3 text-xs text-purple-400 hover:underline">عرض الدورة المتعلقة ←</a></template>
      </div>
    </template>
  </div>
</main>
<footer class="py-8 border-t border-white/5 text-center text-xs text-slate-500">© 2026 AI Rank One</footer>
<script>
function glossaryApp(){return{
  search:'',
  terms:[
    {en:'RAG (Retrieval-Augmented Generation)',ar:'الاسترجاع المعزز بالتوليد',def:'ربط النماذج اللغوية بمصادر بيانات خارجية لاسترجاع المعلومات الدقيقة قبل التوليد وتقليل الهلوسة.',link:'courses/building-a-production-rag-system/index.html'},
    {en:'Fine-Tuning (LoRA / QLoRA)',ar:'الضبط الدقيق للنماذج',def:'تدريب نموذج مدرب مسبقاً على بيانات متخصصة لتكييفه لمهام محددة بكفاءة عالية.',link:'courses/llm-fine-tuning-with-lora-and-qlora/index.html'},
    {en:'Prompt Engineering',ar:'هندسة التلقين',def:'صياغة المدخلات الممررة للنماذج اللغوية للحصول على مخرجات دقيقة ومثبتة.',link:'courses/advanced-prompt-engineering-for-developers/index.html'},
    {en:'Multi-Agent Systems',ar:'أنظمة الوكلاء المتعددة',def:'بنية تقسم المهام المعقدة على شبكة وكلاء أذكياء يتواصلون لحل المشكلات.',link:'courses/langgraph-multi-agents/index.html'},
    {en:'MLOps',ar:'عمليات تشغيل الذكاء الاصطناعي',def:'أتمتة وتوحيد نشر ومراقبة وتحديث نماذج تعلم الآلة في بيئة الإنتاج.',link:'courses/mlops-from-experiment-to-production/index.html'},
    {en:'AI Governance',ar:'حوكمة الذكاء الاصطناعي',def:'إطار تنظيمي وأخلاقي لضمان سلامة وعدالة وامتثال تطبيقات الذكاء الاصطناعي.',link:'courses/ai-governance-and-ethics-in-the-arab-world/index.html'}
  ],
  filteredTerms(){
    const q = this.search.toLowerCase().trim();
    if(!q) return this.terms;
    return this.terms.filter(t => t.en.toLowerCase().includes(q) || t.ar.includes(q) || t.def.includes(q));
  }
};}
</script>
</body>
</html>
